<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let componente = prompt("Ingrese el nombre del componente");
        let stock = parseInt(prompt("Ingrese la cantidad actual en stock"));
        let estado = "";
        if(stock<0){
            console.log("Error: no puedes ingresar valores negativos, vuelve a intentarlo.");
        }else if(stock>=3&&stock<=10){
            estado="Stock bajo, considerar reponer.";
            console.log("Resumen:"+"\nComponente: "+componente+"\nCantidad actual: "+ stock+"\nEstado: "+estado);
        }else if(stock>10){
            estado="Stock suficiente.";
            console.log("Resumen:"+"\nComponente: "+componente+"\nCantidad actual: "+ stock+"\nEstado: "+estado);
        }else if(stock<3){
            estado="Pedido urgente.";
            console.log("Resumen:"+"\nComponente: "+componente+"\nCantidad  actual: "+ stock+"\nEstado: "+estado);
        }
    </script>
</body>

</html>
