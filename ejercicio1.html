<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = parseInt(prompt("Ingrese un numero"));
        let b = parseInt(prompt("Ingrese otro numero"));
        suma = a+b;
        resta = a-b;
        multi = a*b;
        div = a/b;
        mod = a%b;
        pot = a**b;
        console.log("Suma: " + suma + "\nResta: " + resta + "\nMultiplicación: " + multi+"\nDivision: "+div+"\nResto: "+mod+"\nPotencia: "+pot);
        </script>
</body>
</html>
