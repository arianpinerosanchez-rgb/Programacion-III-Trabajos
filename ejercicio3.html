<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num1 = parseInt(prompt("Ingrese un numero"));
        let num2 = parseInt(prompt("Ingrese otro numero"));
        let op = prompt("Ingrese un operador (+, -, *, /, %)");
        if(op=="+"){
            suma = num1+num2;
            console.log("El resultado de la suma es: "+suma);
        }else if(op =="-"){
            resta = num1-num2;
            console.log("El resultado de la resta es: "+resta);
        }else if(op=="*"){
            multi = num1*num2;
            console.log("El resultado de la multiplicacion es: "+multi);
        }else if(op=="/"){
            if(num1==0||num2==0){
                console.log("Error, no se pueden realizar divisiones con 0");
            }else{
                div = num1/num2;
                console.log("El resultado de la division es: "+div);
            }
        }else if(op=="%"){
            mod = num1%num2;
            console.log("El el resto de la division es: "+mod);
        }
    </script>
</body>
</html>
